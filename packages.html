<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tour Packages — Dremz Destination</title>
  <meta name="description" content="Explore handcrafted tour packages for Kashmir, Goa, Kerala, Bali, Maldives, Rajasthan & more. Adventure, honeymoon, family & group trips. Book now!">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{navy:{900:'#0A1628',800:'#132240'},teal:{500:'#0E7490',400:'#14B8A6'},gold:{500:'#F59E0B',400:'#FBBF24'}},fontFamily:{heading:['Playfair Display','serif'],body:['Inter','sans-serif']}}}}</script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/Swiper/11.0.5/swiper-bundle.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="font-body">
<div id="main-content">

  <!-- Page Hero -->
  <section class="relative py-40 pb-20 bg-navy-900 overflow-hidden">
    <div class="absolute inset-0">
      <img src="https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?w=1920&q=80" alt="Tour Packages" class="w-full h-full object-cover opacity-30">
      <div class="absolute inset-0 bg-gradient-to-b from-navy-900/60 to-navy-900"></div>
    </div>
    <div class="relative z-10 max-w-4xl mx-auto text-center px-4">
      <p class="section-subtitle !text-amber-400" data-aos="fade-down">Curated Experiences</p>
      <h1 class="text-white font-heading text-4xl sm:text-5xl md:text-6xl font-bold mb-4" data-aos="fade-up">Tour Packages</h1>
      <p class="text-white/60 text-lg" data-aos="fade-up" data-aos-delay="200">Find the perfect trip for every budget, style, and dream destination.</p>
    </div>
  </section>

  <!-- Filters -->
  <section class="py-8 bg-white border-b sticky top-[60px] z-30 shadow-sm">
    <div class="max-w-7xl mx-auto px-4">
      <div class="flex flex-wrap gap-3 justify-center" id="filter-bar">
        <button class="filter-tab active" data-filter="all">All Packages</button>
        <button class="filter-tab" data-filter="adventure">🏔️ Adventure</button>
        <button class="filter-tab" data-filter="honeymoon">💕 Honeymoon</button>
        <button class="filter-tab" data-filter="family">👨‍👩‍👧‍👦 Family</button>
        <button class="filter-tab" data-filter="group">👥 Group</button>
        <button class="filter-tab" data-filter="luxury">✨ Luxury</button>
      </div>
    </div>
  </section>

  <!-- Packages Grid -->
  <section class="py-16 bg-gray-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="packages-grid"></div>
      <p class="text-center text-gray-400 mt-8 hidden" id="no-results">No packages found for this filter. Try another category!</p>
    </div>
  </section>

  <!-- Package Detail Modal -->
  <div class="modal-overlay" id="package-modal">
    <div class="modal-content" id="modal-body"></div>
  </div>

</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Swiper/11.0.5/swiper-bundle.min.js"></script>
<script src="js/app.js"></script>
<script src="js/packages.js"></script>
</body>
</html>
