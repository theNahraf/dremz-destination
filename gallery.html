<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery — Dremz Destination</title>
  <meta name="description" content="Browse stunning travel photography from our trips across Kashmir, Goa, Kerala, Bali, Maldives and more.">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{navy:{900:'#0A1628',800:'#132240'},teal:{500:'#0E7490',400:'#14B8A6'},gold:{500:'#F59E0B',400:'#FBBF24'}},fontFamily:{heading:['Playfair Display','serif'],body:['Inter','sans-serif']}}}}</script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/glightbox/3.2.0/css/glightbox.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="font-body">
<div id="main-content">
  <section class="relative py-40 pb-20 bg-navy-900 overflow-hidden">
    <div class="absolute inset-0"><img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=1920&q=80" class="w-full h-full object-cover opacity-25"><div class="absolute inset-0 bg-gradient-to-b from-navy-900/60 to-navy-900"></div></div>
    <div class="relative z-10 max-w-4xl mx-auto text-center px-4">
      <p class="section-subtitle !text-amber-400" data-aos="fade-down">Visual Stories</p>
      <h1 class="text-white font-heading text-4xl sm:text-5xl md:text-6xl font-bold mb-4" data-aos="fade-up">Travel Gallery</h1>
      <p class="text-white/60 text-lg" data-aos="fade-up" data-aos-delay="200">Moments captured from our travelers' journeys around the world.</p>
    </div>
  </section>

  <!-- Filters -->
  <section class="py-8 bg-white border-b">
    <div class="max-w-7xl mx-auto px-4 flex flex-wrap gap-3 justify-center" id="gallery-filters">
      <button class="filter-tab active" data-filter="all">All</button>
      <button class="filter-tab" data-filter="india">India</button>
      <button class="filter-tab" data-filter="southeast-asia">Southeast Asia</button>
      <button class="filter-tab" data-filter="europe">Europe</button>
      <button class="filter-tab" data-filter="adventure">Adventure</button>
      <button class="filter-tab" data-filter="honeymoon">Honeymoon</button>
    </div>
  </section>

  <!-- Masonry Grid -->
  <section class="py-16 bg-gray-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="masonry-grid" id="gallery-grid"></div>
    </div>
  </section>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/glightbox/3.2.0/js/glightbox.min.js"></script>
<script src="js/app.js"></script>
<script src="js/gallery.js"></script>
</body>
</html>
