<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO Meta Tags -->
  <title>Customer Reviews — Dremz Destination</title>
  <meta name="description" content="Read reviews from our happy travelers. Leave your own feedback and share your experience with Dremz Destination!">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://dremzdestination.com/reviews.html">
  <meta name="theme-color" content="#0A1628">

  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <!-- Resource Hints & Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://images.unsplash.com">
  <link rel="preconnect" href="https://cdn.tailwindcss.com">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{navy:{900:'#0A1628',800:'#132240'},teal:{500:'#0E7490',400:'#14B8A6'},gold:{500:'#F59E0B',400:'#FBBF24'}},fontFamily:{heading:['Playfair Display','serif'],body:['Inter','sans-serif']}}}}</script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="font-body">
  <main id="main-content">

    <!-- Hero -->
    <section class="relative py-40 pb-20 bg-navy-900 overflow-hidden">
      <div class="absolute inset-0">
        <img src="https://images.unsplash.com/photo-1522199710521-72d69614c702?w=1920&q=80" alt="Happy travelers" width="1920" height="1080" fetchpriority="high" class="w-full h-full object-cover opacity-20">
        <div class="absolute inset-0 bg-gradient-to-b from-navy-900/60 to-navy-900"></div>
      </div>
      <div class="relative z-10 max-w-4xl mx-auto text-center px-4">
        <!-- <p class="section-subtitle !text-amber-400" data-aos="fade-down">Testimonials</p> -->
        <h1 class="text-white font-heading text-4xl sm:text-5xl md:text-6xl font-bold mb-4" data-aos="fade-up">Hear From Our Travelers</h1>
        <p class="text-white/60 text-lg" data-aos="fade-up" data-aos-delay="200">Real stories from people who explored the world with us.</p>
      </div>
    </section>
    <section class="py-20 bg-gray-50">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
 
        <!-- Leave a Review Form -->
        <div class="max-w-3xl mx-auto" data-aos="fade-up">
          <div class="bg-white rounded-2xl shadow-xl p-8 sm:p-10 border-t-4 border-amber-500">
            <div class="text-center mb-8">
              <h2 class="font-heading text-3xl font-bold text-gray-900 mb-2">Leave a Review</h2>
              <p class="text-gray-500 text-sm">We'd love to hear about your experience with us!</p>
            </div>

            <form id="review-form">
              <input type="hidden" name="access_key" value="59f9b56f-9b10-4493-8ca6-0280d584ddf3">
              <input type="hidden" name="subject" value="New Customer Review — Dremz Destination">
              <input type="hidden" name="from_name" value="Dremz Destination Website">
              <input type="hidden" name="rating" id="rating-input" value="5">
              <input type="checkbox" name="botcheck" class="hidden">

              <div class="mb-8 text-center">
                <label class="block text-gray-700 font-semibold mb-3">Rate Your Trip</label>
                <div class="flex justify-center gap-2 text-3xl star-rating cursor-pointer">
                  <i class="fas fa-star text-amber-500 transition-colors hover:scale-110" data-value="1"></i>
                  <i class="fas fa-star text-amber-500 transition-colors hover:scale-110" data-value="2"></i>
                  <i class="fas fa-star text-amber-500 transition-colors hover:scale-110" data-value="3"></i>
                  <i class="fas fa-star text-amber-500 transition-colors hover:scale-110" data-value="4"></i>
                  <i class="fas fa-star text-amber-500 transition-colors hover:scale-110" data-value="5"></i>
                </div>
              </div>

              <div class="grid sm:grid-cols-2 gap-5 mb-5">
                <div class="form-group">
                  <label>Full Name *</label>
                  <input type="text" name="name" class="form-control" required placeholder="Your name">
                </div>
                <div class="form-group">
                  <label>Email Address</label>
                  <input type="email" name="email" class="form-control" placeholder="your@email.com (optional)">
                </div>
                <div class="form-group sm:col-span-2">
                  <label>Tour / Destination</label>
                  <input type="text" name="destination" class="form-control" placeholder="Where did you travel? (e.g. Kerala, Maldives)">
                </div>
              </div>
              
              <div class="form-group mb-8">
                <label>Your Review *</label>
                <textarea name="message" class="form-control" rows="5" required placeholder="Tell us what you loved about the trip..."></textarea>
              </div>

              <button type="submit" id="review-submit" class="btn-gold w-full justify-center text-base py-4">
                <span>Submit Review</span>
                <i class="fas fa-paper-plane"></i>
              </button>
            </form>
          </div>
        </div>

      </div>
    </section>

  </main>
  
  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js" defer></script>
  <script src="js/app.js?v=4" defer></script>
  <script src="js/reviews.js?v=1" defer></script>
</body>
</html>
