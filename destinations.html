<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Destinations — Dremz Destination</title>
  <meta name="description" content="Explore stunning destinations across India, Southeast Asia, Europe & more with Dremz Destination. Find your perfect getaway.">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{navy:{900:'#0A1628',800:'#132240'},teal:{500:'#0E7490',400:'#14B8A6'},gold:{500:'#F59E0B',400:'#FBBF24'}},fontFamily:{heading:['Playfair Display','serif'],body:['Inter','sans-serif']}}}}</script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="font-body">
<div id="main-content">
  <section class="relative py-40 pb-20 bg-navy-900 overflow-hidden">
    <div class="absolute inset-0"><img src="https://images.unsplash.com/photo-1488085061387-422e29b40080?w=1920&q=80" class="w-full h-full object-cover opacity-30"><div class="absolute inset-0 bg-gradient-to-b from-navy-900/60 to-navy-900"></div></div>
    <div class="relative z-10 max-w-4xl mx-auto text-center px-4">
      <p class="section-subtitle !text-amber-400" data-aos="fade-down">Explore The World</p>
      <h1 class="text-white font-heading text-4xl sm:text-5xl md:text-6xl font-bold mb-4" data-aos="fade-up">Our Destinations</h1>
      <p class="text-white/60 text-lg" data-aos="fade-up" data-aos-delay="200">From the peaks of Kashmir to the beaches of Maldives — your adventure awaits.</p>
    </div>
  </section>

  <section class="py-20 bg-white">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="dest-grid"></div>
    </div>
  </section>

  <!-- Destination Detail (hidden by default) -->
  <section class="hidden bg-gray-50 py-16" id="dest-detail"></section>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
<script src="js/app.js"></script>
<script src="js/destinations.js"></script>
</body>
</html>
